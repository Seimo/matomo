name: matomo

services:
  db:
    image: mariadb:lts
    command: --max-allowed-packet=64MB
    restart: always
    volumes:
      - db_data:/var/lib/mysql:Z
    environment:
      - TZ=${DEFAULT_TIME_ZONE}
      - MARIADB_AUTO_UPGRADE=1
      - MARIADB_DATABASE=matomo
      - MARIADB_DISABLE_UPGRADE_BACKUP=1
      - MARIADB_INITDB_SKIP_TZINFO=1
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_USER=${MARIADB_ROOT_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}

  app:
    image: matomo:fpm-alpine
    restart: always
    depends_on:
      - db
    volumes:
      - matomo_data:/var/www/html:z
    environment:
      - TZ=${DEFAULT_TIME_ZONE}
      - MATOMO_DATABASE_ADAPTER=mysql
      - MATOMO_DATABASE_DBNAME=matomo
      - MATOMO_DATABASE_HOST=db
      - MATOMO_DATABASE_TABLES_PREFIX=matomo_
      - MATOMO_DATABASE_USERNAME=${MARIADB_ROOT_USER}
      - MATOMO_DATABASE_PASSWORD=${MARIADB_PASSWORD}
      - PHP_MEMORY_LIMIT=2048M

  web:
    image: nginx:alpine
    restart: always
    depends_on:
      - app
    environment:
      - TZ=${DEFAULT_TIME_ZONE}
    volumes:
      - matomo_data:/var/www/html:z,ro
      - ./matomo.conf:/etc/nginx/conf.d/default.conf:z,ro
    ports:
      - ${WEB_HTTP_PORT}:80
      #- ${WEB_HTTPS_PORT}:443

volumes:
  db_data:
  matomo_data: